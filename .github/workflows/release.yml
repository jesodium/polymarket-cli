name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.6)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          sed -i'' -e "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          BIN=fiberglass
          [ "${{ runner.os }}" = "Windows" ] && BIN=fiberglass.exe
          cd target/${{ matrix.target }}/release
          tar czf ../../../fiberglass-${RELEASE_TAG}-${{ matrix.target }}.tar.gz "$BIN"
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: fiberglass-${{ matrix.target }}
          path: fiberglass-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum fiberglass-*.tar.gz > checksums.txt

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${RELEASE_TAG#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { flag = 1; next }
            /^## \[/ { flag = 0 }
            flag { print }
          ' CHANGELOG.md > RELEASE_BODY.md
          # Fall back to a stub if the version has no CHANGELOG entry yet.
          if [ ! -s RELEASE_BODY.md ]; then
            echo "Release ${RELEASE_TAG}." > RELEASE_BODY.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: RELEASE_BODY.md
          files: |
            fiberglass-*.tar.gz
            checksums.txt

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: dtolnay/rust-toolchain@stable

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/update-formula.sh ${RELEASE_TAG}

      - name: Sync Cargo.toml version
        run: |
          VERSION="${RELEASE_TAG#v}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          cargo update --workspace

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/fiberglass.rb Cargo.toml Cargo.lock
          git diff --cached --quiet && echo "Nothing to commit" || {
            git commit -m "release: update formula and version to ${RELEASE_TAG}"
            git push
          }
